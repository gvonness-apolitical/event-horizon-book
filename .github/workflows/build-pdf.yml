name: Build PDF

on:
  push:
    branches: [main]
    tags: ['v*']
  pull_request:
    branches: [main]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Build PDF
        uses: xu-cheng/latex-action@v3
        with:
          root_file: src/book.tex
          latexmk_use_lualatex: true
          working_directory: .
          extra_system_packages: "biber"
          args: -cd -outdir=../build

      - name: Upload PDF artifact
        uses: actions/upload-artifact@v4
        with:
          name: event-horizon-book
          path: build/book.pdf

      - name: Attach PDF to release
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          files: build/book.pdf

      - name: Publish PDF to event-horizon repo
        if: startsWith(github.ref, 'refs/tags/v')
        env:
          GH_TOKEN: ${{ secrets.EVENT_HORIZON_TOKEN }}
        run: |
          VERSION=${GITHUB_REF#refs/tags/}
          REPO="gvonness/event-horizon"
          TAG="book"
          TITLE="Event Horizon — Companion Textbook"
          NOTES="PDF of *Event Horizon: A Computational Journey into Black Hole Physics* (${VERSION})."
          PDF="build/book.pdf"

          if gh release view "$TAG" --repo "$REPO" &>/dev/null; then
            gh release upload "$TAG" "$PDF" --repo "$REPO" --clobber
            gh release edit "$TAG" --repo "$REPO" --notes "$NOTES"
          else
            gh release create "$TAG" "$PDF" --repo "$REPO" \
              --title "$TITLE" --notes "$NOTES" --latest=false
          fi
