name: Build PDF

on:
  push:
    branches: [main]
    tags: ['v*']
  pull_request:
    branches: [main]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Build PDF
        uses: xu-cheng/latex-action@v3
        with:
          root_file: src/book.tex
          latexmk_use_lualatex: true
          working_directory: .
          extra_system_packages: "biber"
          args: -cd -outdir=../build

      - name: Upload PDF artifact
        uses: actions/upload-artifact@v4
        with:
          name: event-horizon-book
          path: build/book.pdf

      - name: Attach PDF to release
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          files: build/book.pdf
